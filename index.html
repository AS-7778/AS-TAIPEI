<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AS TAIPEI 服務系統 v1.6.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <style>
        :root { --primary-orange: #f97316; --primary-grey: #e5e7eb; }
        body { font-family: 'Inter', sans-serif; background-color: var(--primary-grey); }
        .signature-canvas { border: 2px solid var(--primary-orange); background-color: #fff; touch-action: none; cursor: crosshair; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* 列印樣式優化 */
        @media print {
            body { background-color: white !important; padding: 0 !important; margin: 0 !important; }
            .no-print { display: none !important; }
            .print-container { 
                box-shadow: none !important; 
                border: none !important; 
                width: 100% !important; 
                max-width: 100% !important; 
                padding: 20px !important; 
                margin: 0 !important; 
            }
            .print-header { display: flex !important; }
            main { box-shadow: none !important; border: none !important; }
            /* 確保顏色在列印時顯示 */
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <header class="text-center mb-8 no-print">
        <h1 class="text-4xl font-extrabold text-orange-500 tracking-wider">AS TAIPEI</h1>
        <p class="text-xl text-white bg-gray-900 px-4 py-1 inline-block rounded-lg shadow-xl mt-2">汽車服務管理系統</p>
    </header>

    <main id="app-container" class="max-w-6xl mx-auto bg-white p-6 md:p-10 rounded-xl shadow-2xl print-container">
        <div id="loading" class="text-center p-8 text-lg text-gray-500">系統初始化中...</div>
        
        <div id="nav-bar" class="hidden flex justify-center space-x-4 mb-8 no-print">
            <button onclick="setMode('history')" class="nav-btn bg-gray-200 text-gray-700 hover:bg-gray-300 p-3 px-6 rounded-lg font-semibold shadow-md transition-all">📋 歷史工單</button>
            <button onclick="setMode('form', null, true)" class="nav-btn bg-orange-500 text-white hover:bg-orange-600 p-3 px-6 rounded-lg font-semibold shadow-md transition-all">➕ 新增工單</button>
        </div>

        <div id="mode-history" class="hidden"></div>
        <div id="mode-form" class="hidden"></div>
        <div id="mode-quote" class="hidden"></div>
    </main>

    <div id="message-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50 no-print">
        <div class="bg-white p-6 rounded-xl shadow-2xl max-w-sm w-full">
            <h3 id="modal-title" class="text-xl font-bold mb-4 text-orange-500">提示</h3>
            <p id="modal-body" class="mb-6 text-gray-700"></p>
            <button onclick="closeMessageModal()" class="w-full bg-orange-500 text-white p-3 rounded-lg font-semibold hover:bg-orange-600">確定</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, serverTimestamp, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        let app, db, auth;
        window.currentMode = 'form';
        window.workOrders = [];
        window.currentFormData = {}; 
        window.currentFilterMonth = new Date().toISOString().slice(0, 7);

        const SALES_REPS = ["小揚", "小蔡", "Audi", "其他"];
        const SERVICE_ITEMS = ["車漆包膜", "車漆鍍膜", "專業洗車", "車漆烤漆", "內裝修復", "玻璃塗層", "燈殼保護", "自訂"];
        const CAR_BRANDS = {
            "Tesla": ["Model 3", "Model Y", "Model S", "Model X"],
            "Porsche": ["911", "Taycan", "Macan", "Cayenne", "718"],
            "Ferrari": ["296 GTB", "SF90", "F8", "Roma", "Purosangue"],
            "Lamborghini": ["Huracán", "Aventador", "Urus", "Revuelto"],
            "Maserati": ["Grecale", "Ghibli", "Levante", "MC20"],
            "BMW": ["M2", "M3", "M4", "M5", "X5", "X6", "XM"],
            "Mercedes-Benz": ["AMG GT", "G63", "S-Class", "E-Class", "C-Class"],
            "Audi": ["R8", "RS6", "RS e-tron GT", "Q8"],
            "Lexus": ["RX", "NX", "UX", "IS", "LM"],
            "Toyota": ["Alphard", "Crown", "RAV4", "Supra"],
            "其他 / 自訂輸入": []
        };

        const initializeFirebase = async () => {
            try {
                const config = { apiKey: "AIzaSyBXjoN2ys4i1MMCDgAgX5SQfnK-3FoodgI", authDomain: "as-taipei-d66fb.firebaseapp.com", projectId: "as-taipei-d66fb", storageBucket: "as-taipei-d66fb.firebasestorage.app", messagingSenderId: "501804734426", appId: "1:501804734426:web:47271f84ff7454aea692e3" };
                app = initializeApp(config);
                db = getFirestore(app);
                auth = getAuth(app);
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        document.getElementById('loading').classList.add('hidden');
                        document.getElementById('nav-bar').classList.remove('hidden');
                        setupFirestoreListener();
                    }
                });
            } catch (e) { console.error(e); }
        };

        const setupFirestoreListener = () => {
            const q = query(collection(db, `artifacts/as-taipei-app/public/data/workOrders`));
            onSnapshot(q, (snap) => {
                window.workOrders = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => b.id.localeCompare(a.id));
                if (window.currentMode === 'history') window.renderHistoryMode();
            });
        };

        const generateOrderId = () => {
            const datePrefix = new Date().toISOString().slice(2, 10).replace(/-/g, '');
            const sameDayOrders = window.workOrders.filter(o => o.id.startsWith(datePrefix));
            const nextNum = (sameDayOrders.length + 1).toString().padStart(4, '0');
            return `${datePrefix}-${nextNum}`;
        };

        window.setMode = (mode, data = null, isNew = false) => {
            window.currentMode = mode;
            if (isNew) {
                window.currentFormData = {
                    id: generateOrderId(),
                    receiveDate: new Date().toISOString().split('T')[0],
                    serviceItems: [{ name: '', customName: '', price: 0 }],
                    paymentMethod: 'cash',
                    invoiceEnabled: false,
                    isSigned: false
                };
            } else if (data) {
                window.currentFormData = data;
            }
            ['history', 'form', 'quote'].forEach(m => {
                const el = document.getElementById(`mode-${m}`);
                if (el) el.classList.add('hidden');
            });
            if (mode === 'history') window.renderHistoryMode();
            else if (mode === 'form') window.renderFormMode();
            else if (mode === 'quote') window.renderQuoteMode();
            
            const targetEl = document.getElementById(`mode-${mode}`);
            if (targetEl) targetEl.classList.remove('hidden');
            window.scrollTo(0,0);
        };

        window.renderHistoryMode = () => {
            const container = document.getElementById('mode-history');
            const filtered = window.workOrders.filter(o => o.receiveDate.startsWith(window.currentFilterMonth));
            
            container.innerHTML = `
                <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                    <h2 class="text-3xl font-bold border-b-4 border-orange-500 pb-1">歷史工單管理</h2>
                    <div class="flex items-center gap-2 no-print">
                        <label class="text-sm font-bold text-gray-500">月份篩選:</label>
                        <input type="month" value="${window.currentFilterMonth}" onchange="window.currentFilterMonth=this.value;window.renderHistoryMode();" class="p-2 border rounded-lg shadow-sm">
                        <button onclick="window.exportToExcel()" class="bg-green-600 text-white p-2 px-4 rounded-lg font-bold hover:bg-green-700 shadow-md">📊 導出 CSV</button>
                    </div>
                </div>
                <div class="overflow-x-auto bg-white rounded-xl border border-gray-200">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-gray-800 text-white">
                            <tr>
                                <th class="p-4 text-sm">工單編號</th>
                                <th class="p-4 text-sm">日期</th>
                                <th class="p-4 text-sm">車牌 / 客戶</th>
                                <th class="p-4 text-sm">狀態</th>
                                <th class="p-4 text-sm text-right">總金額</th>
                                <th class="p-4 text-sm text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y">
                            ${filtered.length === 0 ? '<tr><td colspan="6" class="p-10 text-center text-gray-400">目前月份無工單資料</td></tr>' : 
                              filtered.map(o => `
                                <tr class="hover:bg-orange-50 transition-colors">
                                    <td class="p-4 font-mono text-sm font-bold text-orange-600">${o.id}</td>
                                    <td class="p-4 text-sm text-gray-600">${o.receiveDate}</td>
                                    <td class="p-4">
                                        <p class="font-bold text-gray-800">${o.licensePlate || 'N/A'}</p>
                                        <p class="text-xs text-gray-500">${o.customerName || '未填寫'}</p>
                                    </td>
                                    <td class="p-4">
                                        ${o.isSigned ? '<span class="px-2 py-1 bg-green-100 text-green-700 text-xs font-bold rounded-full">已簽名</span>' : '<span class="px-2 py-1 bg-yellow-100 text-yellow-700 text-xs font-bold rounded-full">未簽名</span>'}
                                    </td>
                                    <td class="p-4 text-right font-bold text-gray-900">NT$ ${(o.finalPrice || 0).toLocaleString()}</td>
                                    <td class="p-4 flex justify-center gap-2">
                                        <button onclick="window.editWorkOrder('${o.id}')" class="text-blue-600 hover:bg-blue-50 p-2 rounded-lg transition-all">✎</button>
                                        <button onclick="window.viewWorkOrder('${o.id}')" class="text-orange-600 hover:bg-orange-50 p-2 rounded-lg transition-all">📄</button>
                                        <button onclick="window.deleteWorkOrder('${o.id}')" class="text-red-400 hover:bg-red-50 p-2 rounded-lg transition-all">✕</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        };

        window.exportToExcel = () => {
            const filtered = window.workOrders.filter(o => o.receiveDate.startsWith(window.currentFilterMonth));
            if (filtered.length === 0) return window.showMessageModal("提示", "無資料可導出。");
            let csv = "工單編號,收車日期,車牌,客戶,聯絡電話,車型,業務,總金額,是否簽名\n";
            filtered.forEach(o => { csv += `${o.id},${o.receiveDate},${o.licensePlate},${o.customerName},${o.phoneNumber},${o.carModel},${o.salesRep},${o.finalPrice},${o.isSigned?'是':'否'}\n`; });
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `AS_TAIPEI_工單_${window.currentFilterMonth}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        window.editWorkOrder = (id) => {
            const order = window.workOrders.find(o => o.id === id);
            const editData = JSON.parse(JSON.stringify(order));
            editData.serviceItems = order.services ? order.services.map(s => ({
                name: SERVICE_ITEMS.includes(s.name) ? s.name : '自訂',
                customName: SERVICE_ITEMS.includes(s.name) ? '' : s.name,
                price: s.price
            })) : [{ name: '', customName: '', price: 0 }];
            window.setMode('form', editData);
        };

        window.viewWorkOrder = (id) => {
            const order = window.workOrders.find(o => o.id === id);
            const viewData = JSON.parse(JSON.stringify(order));
            viewData.serviceItems = order.services || []; 
            window.setMode('quote', viewData);
        };

        window.renderFormMode = () => {
            const container = document.getElementById('mode-form');
            container.innerHTML = `
                <div class="flex justify-between items-center mb-6 no-print">
                    <h2 class="text-3xl font-bold border-b-4 border-orange-500 pb-1">服務工單填寫</h2>
                    <p class="text-lg font-mono font-black text-orange-600 bg-orange-50 px-3 py-1 rounded-lg border border-orange-200"># ${window.currentFormData.id}</p>
                </div>
                <form id="work-order-form" class="space-y-8 no-print">
                    <div class="bg-gray-50 p-6 rounded-2xl border border-gray-100 space-y-6">
                        <p class="text-sm font-bold text-gray-400 border-b pb-2 uppercase tracking-widest">車主與車輛資訊</p>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            <div class="space-y-1"><label class="text-xs font-bold text-gray-500">收車日期</label><input type="date" id="receiveDate" value="${window.currentFormData.receiveDate}" class="w-full p-3 border-2 border-gray-200 rounded-xl bg-white shadow-sm focus:border-orange-500 outline-none"></div>
                            <div class="space-y-1"><label class="text-xs font-bold text-gray-500">車牌號碼</label><input type="text" id="licensePlate" value="${window.currentFormData.licensePlate || ''}" placeholder="例: ABC-1234" class="w-full p-3 border-2 border-gray-200 rounded-xl uppercase bg-white shadow-sm focus:border-orange-500 outline-none"></div>
                            <div class="space-y-1"><label class="text-xs font-bold text-gray-500">負責業務</label><select id="salesRep" class="w-full p-3 border-2 border-gray-200 rounded-xl bg-white shadow-sm">${SALES_REPS.map(r => `<option value="${r}" ${window.currentFormData.salesRep === r ? 'selected' : ''}>${r}</option>`).join('')}</select></div>
                            <div class="space-y-1"><label class="text-xs font-bold text-gray-500">客戶姓名</label><input type="text" id="customerName" value="${window.currentFormData.customerName || ''}" placeholder="輸入姓名" class="w-full p-3 border-2 border-gray-200 rounded-xl bg-white shadow-sm"></div>
                            <div class="space-y-1"><label class="text-xs font-bold text-gray-500">聯絡電話</label><input type="tel" id="phoneNumber" value="${window.currentFormData.phoneNumber || ''}" placeholder="09xx" class="w-full p-3 border-2 border-gray-200 rounded-xl bg-white shadow-sm"></div>
                            <div class="space-y-1"><label class="text-xs font-bold text-gray-500">車輛廠牌</label><select id="carBrand" onchange="window.handleBrandChange(this.value)" class="w-full p-3 border-2 border-gray-200 rounded-xl bg-white shadow-sm"><option value="" disabled ${!window.currentFormData.carBrand ? 'selected' : ''}>請選擇</option>${Object.keys(CAR_BRANDS).map(b => `<option value="${b}" ${window.currentFormData.carBrand === b ? 'selected' : ''}>${b}</option>`).join('')}</select></div>
                        </div>
                        <div id="model-container" class="mt-2"></div>
                    </div>
                    <div class="space-y-4">
                        <p class="text-sm font-bold text-gray-400 border-b pb-2 uppercase tracking-widest">施工服務項目</p>
                        <div id="service-items-container" class="space-y-3"></div>
                        <button type="button" onclick="window.addServiceItem()" class="w-full py-4 border-2 border-dashed border-gray-300 rounded-xl text-gray-400 hover:border-orange-500 transition-all font-bold">+ 新增服務項目</button>
                    </div>
                    <div class="space-y-1"><label class="text-xs font-bold text-gray-500">備註 (Notes)</label><textarea id="notes" rows="3" class="w-full p-3 border-2 border-gray-200 rounded-xl bg-white shadow-sm outline-none">${window.currentFormData.notes || ''}</textarea></div>
                    <div class="text-right p-8 bg-gray-900 text-white rounded-2xl shadow-xl flex justify-between items-center"><span class="text-gray-400 font-bold tracking-widest uppercase">目前合計</span><span id="form-base-price" class="text-4xl font-extrabold text-orange-500">NT$ 0</span></div>
                    <button type="submit" class="w-full bg-orange-500 text-white py-5 rounded-xl font-bold text-2xl shadow-xl hover:bg-orange-600 transition-all">預覽報價單 &rarr;</button>
                </form>
            `;
            window.handleBrandChange(window.currentFormData.carBrand || "");
            window.renderServiceItems();
            document.getElementById('work-order-form').onsubmit = (e) => {
                e.preventDefault();
                window.currentFormData.receiveDate = document.getElementById('receiveDate').value;
                window.currentFormData.licensePlate = document.getElementById('licensePlate').value.toUpperCase();
                window.currentFormData.salesRep = document.getElementById('salesRep').value;
                window.currentFormData.customerName = document.getElementById('customerName').value;
                window.currentFormData.phoneNumber = document.getElementById('phoneNumber').value;
                window.currentFormData.carBrand = document.getElementById('carBrand').value;
                
                if (window.currentFormData.carBrand === "其他 / 自訂輸入") {
                    const customInfo = document.getElementById('customCarInfo');
                    window.currentFormData.carModel = customInfo ? customInfo.value : "其他";
                } else {
                    const selMEl = document.getElementById('carModel');
                    const selM = selMEl ? selMEl.value : "";
                    if (selM === '自訂車型') {
                        const manualEl = document.getElementById('manualModel');
                        window.currentFormData.carModel = manualEl ? `${window.currentFormData.carBrand} ${manualEl.value}` : window.currentFormData.carBrand;
                    } else {
                        window.currentFormData.carModel = `${window.currentFormData.carBrand} ${selM}`;
                    }
                }
                window.currentFormData.notes = document.getElementById('notes').value;
                window.setMode('quote');
            };
        };

        window.handleBrandChange = (brand) => {
            const container = document.getElementById('model-container');
            if (!container) return;
            const models = CAR_BRANDS[brand] || [];
            const currentM = window.currentFormData.carModel?.replace(brand + ' ', '') || '';
            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-gray-500">車型系列</label>
                        ${brand === "其他 / 自訂輸入" || models.length === 0 ? 
                          `<input type="text" id="customCarInfo" value="${currentM}" placeholder="手動輸入" class="w-full p-3 border-2 border-orange-200 rounded-xl bg-orange-50">` :
                          `<select id="carModel" class="w-full p-3 border-2 border-gray-200 rounded-xl bg-white shadow-sm" onchange="const box=document.getElementById('custom-model-box'); if(this.value==='自訂車型') box.classList.remove('hidden'); else box.classList.add('hidden');">
                              ${models.map(m => `<option value="${m}" ${currentM === m ? 'selected' : ''}>${m}</option>`).join('')}
                              <option value="自訂車型">自訂車型...</option>
                          </select>`
                        }
                    </div>
                    <div id="custom-model-box" class="hidden space-y-1">
                         <label class="text-xs font-bold text-orange-500">自訂車型名稱</label>
                         <input type="text" id="manualModel" value="${currentM}" placeholder="例如: 911 GT3 RS" class="w-full p-3 border-2 border-orange-200 rounded-xl bg-orange-50">
                    </div>
                </div>`;
            const carModelEl = document.getElementById('carModel');
            if (carModelEl && carModelEl.value === '自訂車型') document.getElementById('custom-model-box').classList.remove('hidden');
        };

        window.renderServiceItems = () => {
            const container = document.getElementById('service-items-container');
            if (!container) return;
            container.innerHTML = window.currentFormData.serviceItems.map((item, i) => `
                <div class="flex flex-col gap-3 bg-white p-5 rounded-2xl border-2 border-gray-100 shadow-sm relative transition-all hover:border-orange-200">
                    <div class="flex gap-4 items-center">
                        <div class="flex-grow"><select onchange="window.updateItemName(${i}, this.value)" class="w-full p-3 border-2 border-gray-100 rounded-xl bg-gray-50 font-bold">${SERVICE_ITEMS.map(s => `<option value="${s}" ${item.name === s ? 'selected' : ''}>${s}</option>`).join('')}</select></div>
                        <div class="w-40 relative"><span class="absolute left-3 top-3.5 text-gray-400 font-bold">NT$</span><input type="number" value="${item.price}" oninput="window.updateItemPrice(${i}, this.value)" class="w-full p-3 pl-12 border-2 border-gray-100 rounded-xl text-right font-mono font-black text-orange-600 text-xl outline-none"></div>
                        <button type="button" onclick="window.removeServiceItem(${i})" class="p-3 text-red-300 hover:text-red-600 text-xl">✕</button>
                    </div>
                    ${item.name === '自訂' ? `<input type="text" value="${item.customName || ''}" oninput="window.updateItemCustomName(${i}, this.value)" class="w-full p-3 border-2 border-orange-200 rounded-xl bg-orange-50 font-bold">` : ''}
                </div>
            `).join('');
            window.updateBasePriceDisplay();
        };

        window.updateItemName = (i, n) => { window.currentFormData.serviceItems[i].name = n; window.renderServiceItems(); };
        window.updateItemCustomName = (i, v) => { window.currentFormData.serviceItems[i].customName = v; };
        window.updateItemPrice = (i, p) => { window.currentFormData.serviceItems[i].price = parseInt(p) || 0; window.updateBasePriceDisplay(); };
        window.addServiceItem = () => { window.currentFormData.serviceItems.push({ name: '自訂', customName: '', price: 0 }); window.renderServiceItems(); };
        window.removeServiceItem = (i) => { window.currentFormData.serviceItems.splice(i, 1); window.renderServiceItems(); };
        window.updateBasePriceDisplay = () => {
            const total = window.currentFormData.serviceItems.reduce((s, i) => s + (i.price || 0), 0);
            const el = document.getElementById('form-base-price');
            if (el) el.textContent = `NT$ ${total.toLocaleString()}`;
        };

        window.renderQuoteMode = () => {
            const container = document.getElementById('mode-quote');
            const base = window.currentFormData.serviceItems.reduce((s, i) => s + (i.price || 0), 0);
            let fee = (window.currentFormData.paymentMethod === 'card' || window.currentFormData.invoiceEnabled) ? Math.round(base * 0.05) : 0;
            const final = base + fee;
            window.currentFormData.finalPrice = final;

            container.innerHTML = `
                <!-- 列印專用抬頭 -->
                <div class="hidden print-header flex justify-between items-center border-b-2 border-gray-800 pb-4 mb-4">
                    <div><h1 class="text-3xl font-black text-orange-500">AS TAIPEI</h1></div>
                    <div class="text-right"><h2 class="text-xl font-bold">服務確認報價單</h2><p class="text-xs font-mono">NO: ${window.currentFormData.id}</p></div>
                </div>
                
                <div class="flex justify-between items-end mb-8 no-print">
                    <div><h2 class="text-3xl font-black border-b-4 border-orange-500 pb-1">報價單明細</h2></div>
                    <div class="text-right"><p class="text-xl font-mono font-black text-gray-800">${window.currentFormData.id}</p></div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-4 gap-10">
                    <div class="lg:col-span-3 space-y-8">
                        <div class="grid grid-cols-2 gap-8 bg-gray-50 p-8 rounded-3xl border border-gray-100">
                            <div class="space-y-2"><label class="text-xs font-bold text-gray-400 uppercase">客戶 CUSTOMER</label><p class="text-2xl font-black text-gray-800">${window.currentFormData.customerName || '未填寫'}</p><p class="text-lg font-medium text-gray-500">${window.currentFormData.phoneNumber || ''}</p></div>
                            <div class="space-y-2 text-right"><label class="text-xs font-bold text-gray-400 uppercase">車輛 VEHICLE</label><p class="text-2xl font-black text-orange-600">${window.currentFormData.licensePlate || 'N/A'}</p><p class="text-lg font-medium text-gray-500">${window.currentFormData.carModel || ''}</p></div>
                        </div>

                        <div class="rounded-3xl border-2 border-gray-100 overflow-hidden shadow-sm">
                            <table class="w-full text-left">
                                <thead class="bg-gray-800 text-white text-xs uppercase"><tr><th class="p-5">項目 Description</th><th class="p-5 text-right w-40">金額 Amount</th></tr></thead>
                                <tbody class="divide-y-2 divide-gray-50">
                                    ${window.currentFormData.serviceItems.map(item => `<tr class="bg-white"><td class="p-5 font-bold text-gray-700">${item.name === '自訂' ? item.customName : item.name}</td><td class="p-5 text-right font-mono font-black text-gray-900 text-lg">NT$ ${item.price.toLocaleString()}</td></tr>`).join('')}
                                </tbody>
                                <tfoot class="bg-orange-50 border-t-4 border-orange-200">
                                    <tr class="text-gray-500"><td class="p-4 px-6 text-right font-bold">項目小計</td><td class="p-4 px-6 text-right font-mono font-bold">NT$ ${base.toLocaleString()}</td></tr>
                                    <tr class="text-gray-500"><td class="p-4 px-6 text-right font-bold">手續費/稅額 (5%)</td><td class="p-4 px-6 text-right font-mono font-bold">NT$ ${fee.toLocaleString()}</td></tr>
                                    <tr class="text-orange-600"><td class="p-6 text-right text-2xl font-black">應付總額</td><td class="p-6 text-right text-3xl font-black font-mono">NT$ ${final.toLocaleString()}</td></tr>
                                </tfoot>
                            </table>
                        </div>

                        <div class="p-8 border-4 border-orange-100 rounded-3xl bg-orange-50 shadow-sm space-y-4">
                            <div class="flex justify-between items-center border-b border-orange-200 pb-3">
                                <p class="text-sm font-black text-orange-500 uppercase">客戶簽收 SIGNATURE ${window.currentFormData.isSigned ? '' : '<span class="ml-2 text-xs bg-yellow-400 text-white px-2 py-0.5 rounded no-print">未簽名待補</span>'}</p>
                                <div class="flex gap-3 no-print">
                                    <button onclick="window.clearSig()" class="text-xs px-4 py-2 bg-white border border-gray-200 text-gray-500 rounded-lg font-bold hover:bg-gray-50">重填</button>
                                    <button onclick="window.saveSig()" class="text-xs px-4 py-2 bg-orange-500 text-white rounded-lg font-bold hover:bg-orange-600">確認簽名</button>
                                </div>
                            </div>
                            <div class="bg-white border-2 border-orange-200 rounded-2xl overflow-hidden shadow-inner h-80 relative">
                                ${window.currentFormData.isSigned ? 
                                    `<img src="${window.currentFormData.signatureImage}" class="w-full h-full object-contain">` : 
                                    `<canvas id="sig-canvas" class="signature-canvas w-full h-full"></canvas>`
                                }
                                ${!window.currentFormData.isSigned ? `<div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-10"><p class="text-6xl font-black">請在此簽名</p></div>` : ''}
                            </div>
                            <p class="text-[10px] text-gray-400 text-center">本人已確認上述服務項目與金額無誤，同意進行施工。</p>
                        </div>
                    </div>

                    <div class="lg:col-span-1 space-y-6 no-print">
                        <div class="p-6 border-2 border-gray-100 rounded-3xl bg-white shadow-lg space-y-6">
                            <p class="text-xs font-black text-gray-400 uppercase border-b pb-3">結帳設定</p>
                            <div class="space-y-4">
                                <div class="space-y-1"><span class="text-xs font-bold text-gray-500">支付方式</span>
                                    <select onchange="window.currentFormData.paymentMethod=this.value;window.renderQuoteMode();" class="w-full p-3 border-2 border-gray-100 rounded-xl font-bold bg-gray-50">
                                        <option value="cash" ${window.currentFormData.paymentMethod==='cash'?'selected':''}>現金 (Cash)</option>
                                        <option value="transfer" ${window.currentFormData.paymentMethod==='transfer'?'selected':''}>匯款 (Transfer)</option>
                                        <option value="card" ${window.currentFormData.paymentMethod==='card'?'selected':''}>信用卡 (+5%)</option>
                                    </select>
                                </div>
                                <label class="flex justify-between items-center cursor-pointer p-4 bg-gray-50 rounded-xl border-2 border-transparent hover:border-orange-200 transition-all">
                                    <span class="text-sm font-bold text-gray-700">開立發票 (+5%)</span>
                                    <input type="checkbox" ${window.currentFormData.invoiceEnabled?'checked':''} onchange="window.currentFormData.invoiceEnabled=this.checked;window.renderQuoteMode();" class="w-6 h-6 accent-orange-500">
                                </label>
                            </div>
                        </div>

                        <div class="flex flex-col gap-3">
                            <button onclick="window.saveToFirebase()" class="bg-gray-900 text-white py-5 rounded-2xl font-black text-xl shadow-xl hover:bg-black transition-all">💾 儲存工單</button>
                            <button onclick="window.triggerPrint();" class="bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700">🖨️ 列印報價單</button>
                            <button onclick="window.setMode('form')" class="bg-gray-100 text-gray-600 py-4 rounded-2xl font-bold hover:bg-gray-200">修改內容</button>
                        </div>
                    </div>
                </div>
            `;
            if(!window.currentFormData.isSigned) setTimeout(initSig, 100);
        };

        // 修復列印邏輯
        window.triggerPrint = () => {
            // 直接觸發 window.print()，依賴 CSS @media print 進行隱藏
            window.print();
        };

        let sigC, sigX, drawing = false;
        const initSig = () => {
            sigC = document.getElementById('sig-canvas'); if(!sigC) return;
            sigX = sigC.getContext('2d');
            sigC.width = sigC.offsetWidth; sigC.height = sigC.offsetHeight;
            sigX.strokeStyle = "#111827"; sigX.lineWidth = 4; sigX.lineJoin = "round"; sigX.lineCap = "round";
            const getP = (e) => { const r = sigC.getBoundingClientRect(); const clientX = e.touches ? e.touches[0].clientX : e.clientX; const clientY = e.touches ? e.touches[0].clientY : e.clientY; return { x: clientX - r.left, y: clientY - r.top }; };
            const s = (e) => { drawing=true; const p=getP(e); sigX.beginPath(); sigX.moveTo(p.x, p.y); };
            const m = (e) => { if(!drawing) return; const p=getP(e); sigX.lineTo(p.x, p.y); sigX.stroke(); };
            const stop = () => drawing=false;
            sigC.addEventListener('mousedown', s); sigC.addEventListener('mousemove', m); window.addEventListener('mouseup', stop);
            sigC.addEventListener('touchstart', (ev)=>{ev.preventDefault(); s(ev);}, {passive:false}); 
            sigC.addEventListener('touchmove', (ev)=>{ev.preventDefault(); m(ev);}, {passive:false});
            sigC.addEventListener('touchend', stop);
        };
        window.clearSig = () => { window.currentFormData.isSigned=false; window.currentFormData.signatureImage=null; window.renderQuoteMode(); };
        window.saveSig = () => { const canvas = document.getElementById('sig-canvas'); if(!canvas) return; window.currentFormData.signatureImage = canvas.toDataURL(); window.currentFormData.isSigned = true; window.renderQuoteMode(); };

        window.saveToFirebase = async () => {
            const data = { 
                ...window.currentFormData, 
                services: window.currentFormData.serviceItems.map(s => ({ name: s.name==='自訂'?s.customName:s.name, price: s.price })), 
                updatedAt: serverTimestamp() 
            };
            const saveData = { ...data }; delete saveData.serviceItems;
            try {
                await setDoc(doc(db, `artifacts/as-taipei-app/public/data/workOrders`, data.id), saveData);
                window.showMessageModal("儲存成功", window.currentFormData.isSigned ? "工單已正式存檔。" : "工單已存為草稿（未簽名）。");
            } catch (e) { window.showMessageModal("錯誤", "儲存失敗，請檢查網路。"); }
        };

        window.deleteWorkOrder = (id) => { if(confirm(`確定要刪除工單 ${id} 嗎？`)) deleteDoc(doc(db, `artifacts/as-taipei-app/public/data/workOrders`, id)); };
        window.showMessageModal = (t, b) => { document.getElementById('modal-title').textContent=t; document.getElementById('modal-body').textContent=b; document.getElementById('message-modal').classList.remove('hidden'); };
        window.closeMessageModal = () => document.getElementById('message-modal').classList.add('hidden');

        initializeFirebase();
    </script>
</body>
</html>
