<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AS TAIPEI 雲端美研系統 v11.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary-orange: #f97316; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #0f172a; -webkit-tap-highlight-color: transparent; }
        .signature-canvas { border: 2px solid #e2e8f0; background-color: #fff; touch-action: none; cursor: crosshair; border-radius: 12px; }
        
        /* 響應式優化：手機端隱藏表格標頭，並將列改為塊級顯示 */
        @media (max-width: 768px) {
            .responsive-table thead { display: none; }
            .responsive-table tr { display: block; border-bottom: 8px solid #f1f5f9; padding: 15px 0; }
            .responsive-table td { display: block; width: 100%; text-align: left !important; padding: 10px 20px !important; border: none !important; }
            .responsive-table td:last-child { border-top: 1px solid #f1f5f9; margin-top: 10px; }
        }

        .print-only { display: none; }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block; }
            .print-container { width: 100% !important; max-width: 100% !important; padding: 0 !important; margin: 0 !important; border: none !important; box-shadow: none !important; }
            body { background-color: white !important; }
            .print-report-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
            .print-report-table th, .print-report-table td { border: 1px solid #000; padding: 8px; text-align: left; font-size: 12px; }
            .print-report-table th { background-color: #f2f2f2 !important; -webkit-print-color-adjust: exact; }
        }
        .notice-card { border-left: 4px solid var(--primary-orange); padding-left: 1rem; }
    </style>
</head>
<body class="min-h-screen">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const CAR_DATABASE = {
            "Porsche 保時捷": ["911", "Taycan", "Cayenne", "Macan", "718 Panamera"],
            "BMW": ["M2/M3/M4", "M5/M8", "X5/X6/X7", "3/5/7 Series", "iX/i4/i7"],
            "Mercedes-Benz": ["G-Class", "AMG GT", "S-Class", "E-Class", "C-Class", "GLE/GLC"],
            "Tesla 特斯拉": ["Model S", "Model X", "Model 3", "Model Y"],
            "Audi 奧迪": ["RS6/RS7", "e-tron GT", "R8", "Q7/Q8", "A4/A5/A6"],
            "Lexus 凌志": ["RX Series", "NX Series", "LM Series", "ES Series", "LC/LS"],
            "Toyota": ["Alphard/Vellfire", "Crown", "RAV4", "GR Yaris/Supra", "Sienna"],
            "Ferrari 法拉利": ["296 GTB", "SF90", "Purosangue", "F8/Roma", "812"],
            "Lamborghini 藍寶堅尼": ["Urus", "Revuelto", "Huracán", "Aventador"],
            "McLaren 麥拉倫": ["750S/720S", "Artura", "GT", "765LT"],
            "Aston Martin": ["DBX", "Vantage", "DB12/DB11"],
            "Bentley 賓利": ["Continental GT", "Bentayga", "Flying Spur"],
            "Rolls-Royce 勞斯萊斯": ["Cullinan", "Ghost", "Phantom", "Spectre"],
            "Maserati 瑪莎拉蒂": ["Grecale", "Levante", "MC20", "Ghibli"],
            "Land Rover": ["Range Rover", "Defender", "Discovery"],
            "Volvo": ["XC90", "XC60", "XC40", "V60/V90"],
            "Mazda": ["CX-60", "CX-5", "CX-30", "Mazda 3"],
            "Honda": ["Civic Type R", "CR-V", "HR-V", "Odyssey"],
            "其他": []
        };

        const SALES_LIST = ["Audi", "小蔡", "小楊", "其他"];

        const SERVICE_TEMPLATES = [
            "全車頂級車漆保護膜 (PPF)",
            "全車改色膜施工",
            "車頭局部防護方案",
            "迎風面保護膜",
            "內裝專屬保護膜",
            "雙層陶瓷深層鍍膜",
            "全車基礎美容增艷",
            "精緻手作洗車保養",
            "玻璃奈米撥水塗層",
            "輪框專屬保護塗層",
            "皮椅深層清潔養護",
            "其他"
        ];

        const firebaseConfig = {
            apiKey: "AIzaSyBEgWLZ4_1cCVswkKll6N4yW1O_xoTEGyg",
            authDomain: "as-taipei-1a211.firebaseapp.com",
            projectId: "as-taipei-1a211",
            storageBucket: "as-taipei-1a211.firebasestorage.app",
            messagingSenderId: "193808418904",
            appId: "1:193808418904:web:b58e1317b5447b4f44e22d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = "as-taipei-1a211";
        
        window.workOrders = [];
        window.currentMode = 'history';
        window.currentFormData = {};
        window.currentFilterMonth = new Date().toISOString().slice(0, 7);

        const startAuth = () => {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    const statusEl = document.getElementById('online-status');
                    if (statusEl) statusEl.innerText = "● 雲端連線中";
                    
                    const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'workOrders'), orderBy("updatedAt", "desc"));
                    onSnapshot(q, (snapshot) => {
                        window.workOrders = snapshot.docs.map(doc => doc.data());
                        if (window.currentMode === 'history') window.renderHistoryMode();
                    });
                } else {
                    try {
                        await signInAnonymously(auth);
                    } catch (e) {
                        console.error("Auth error:", e);
                    }
                }
            });
        };

        window.calculateOrderTotal = (o) => {
            const subtotal = (o.serviceItems || []).reduce((sum, item) => sum + (parseInt(item.price) || 0), 0);
            const hasTax = o.needsInvoice || o.paymentMethod === '信用卡';
            const tax = hasTax ? Math.round(subtotal * 0.05) : 0;
            return subtotal + tax;
        };

        window.showMessage = (text) => {
            const el = document.getElementById('ui-message');
            const txt = document.getElementById('ui-message-text');
            if (!el || !txt) return;
            txt.innerText = text;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        };

        window.deleteFromCloud = (id) => {
            window.pendingDeleteId = id;
            const modal = document.getElementById('custom-confirm-modal');
            if (modal) modal.classList.remove('hidden');
        };

        window.executeDelete = async () => {
            const id = window.pendingDeleteId;
            const modal = document.getElementById('custom-confirm-modal');
            if (modal) modal.classList.add('hidden');
            if (!id) return;
            
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'workOrders', id));
                window.pendingDeleteId = null;
                window.showMessage("工單已成功刪除");
            } catch (e) {
                console.error("Delete error:", e);
                window.showMessage("刪除失敗，請檢查網路連線。");
            }
        };

        window.setMode = (mode, data = null, isNew = false) => {
            window.currentMode = mode;
            if (isNew) {
                const today = new Date().toISOString().split('T')[0];
                window.currentFormData = {
                    id: `AS-${new Date().toISOString().slice(2,10).replace(/-/g,'')}-${(window.workOrders.length+1).toString().padStart(3,'0')}`,
                    receiveDate: today, deliveryDate: today,
                    customerName: '', customerPhone: '', licensePlate: '',
                    carBrand: 'Audi 奧迪', carBrandCustom: '',
                    carModel: 'RS6/RS7', carModelCustom: '',
                    salesPerson: 'Audi', salesPersonCustom: '',
                    paymentMethod: '現金', needsInvoice: false,
                    serviceItems: [{ name: '全車頂級車漆保護膜 (PPF)', nameCustom: '', price: 0 }],
                    notes: '', isSigned: false, signatureImage: null
                };
            } else if (data) { window.currentFormData = data; }
            
            ['history', 'form', 'quote', 'printPreview'].forEach(m => {
                const el = document.getElementById(`mode-${m}`);
                if (el) el.classList.add('hidden');
            });

            if (mode === 'history') window.renderHistoryMode();
            else if (mode === 'form') window.renderFormMode();
            else if (mode === 'quote') window.renderQuoteMode();
            else if (mode === 'printPreview') window.renderPrintPreview();
            
            const target = document.getElementById(`mode-${mode}`);
            if (target) target.classList.remove('hidden');
            window.scrollTo(0,0);
        };

        window.renderHistoryMode = () => {
            const filtered = window.workOrders.filter(o => o.receiveDate.startsWith(window.currentFilterMonth));
            const monthlyRevenue = filtered.reduce((sum, o) => sum + window.calculateOrderTotal(o), 0);

            document.getElementById('mode-history').innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8 no-print">
                    <div class="bg-white p-6 rounded-3xl border shadow-sm">
                        <p class="text-[10px] font-black text-slate-400 uppercase mb-1">選擇查詢月份</p>
                        <input type="month" value="${window.currentFilterMonth}" onchange="window.currentFilterMonth=this.value;window.renderHistoryMode();" class="w-full p-3 border-2 rounded-xl font-bold focus:border-orange-500 outline-none">
                    </div>
                    <div class="bg-slate-900 p-6 rounded-3xl shadow-xl text-white">
                        <p class="text-[10px] font-black text-slate-400 mb-1">案件量</p>
                        <p class="text-4xl font-black text-orange-500">${filtered.length} <span class="text-sm text-white">件</span></p>
                    </div>
                    <div class="bg-orange-500 p-6 rounded-3xl shadow-xl text-white">
                        <p class="text-[10px] font-black text-white/70 mb-1">總營收 (含稅)</p>
                        <p class="text-3xl font-black">NT$ ${monthlyRevenue.toLocaleString()}</p>
                    </div>
                    <div class="bg-white p-6 rounded-3xl border shadow-sm flex flex-col justify-center gap-2">
                        <button onclick="window.exportExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white p-3 rounded-xl font-black text-xs flex items-center justify-center gap-2 shadow-md transition-all">
                            📊 匯出 Excel
                        </button>
                        <button onclick="window.setMode('printPreview')" class="bg-slate-700 hover:bg-slate-800 text-white p-3 rounded-xl font-black text-xs flex items-center justify-center gap-2 shadow-md transition-all">
                            🖨️ 列印報表預覽
                        </button>
                    </div>
                </div>

                <div class="bg-white rounded-3xl border shadow-sm overflow-hidden no-print">
                    <table class="w-full text-left responsive-table">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="p-5 text-xs font-bold text-slate-400">單號 / 日期</th>
                                <th class="p-5 text-xs font-bold text-slate-400">客戶 / 車輛</th>
                                <th class="p-5 text-xs font-bold text-slate-400">明細 / 總額</th>
                                <th class="p-5 text-right text-xs font-bold text-slate-400">操作</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y">
                            ${filtered.map(o => {
                                const subtotal = (o.serviceItems || []).reduce((s, i) => s + (parseInt(i.price) || 0), 0);
                                const hasTax = o.needsInvoice || o.paymentMethod === '信用卡';
                                const tax = hasTax ? Math.round(subtotal * 0.05) : 0;
                                const total = subtotal + tax;

                                return `
                                <tr class="hover:bg-slate-50 transition-colors">
                                    <td class="p-5 align-top">
                                        <div class="md:hidden text-[10px] text-slate-400 font-bold uppercase mb-1">工單編號</div>
                                        <span class="font-black text-orange-600 text-lg">${o.id}</span><br>
                                        <span class="text-xs text-slate-400 font-medium">接車：${o.receiveDate}</span>
                                    </td>
                                    <td class="p-5 align-top">
                                        <div class="md:hidden text-[10px] text-slate-400 font-bold uppercase mb-1">客戶與車輛</div>
                                        <div class="flex items-center gap-1 font-black text-slate-800 text-lg">
                                            ${o.customerName} <span class="text-slate-400 text-sm font-normal">(${o.customerPhone || '-'})</span>
                                        </div>
                                        <div class="font-black text-slate-700 uppercase tracking-tight text-xl mb-1">${o.licensePlate}</div>
                                        <div class="text-xs text-slate-500 font-bold">${o.carBrand === '其他' ? o.carBrandCustom : o.carBrand} ${o.carModel === '其他' ? o.carModelCustom : o.carModel}</div>
                                    </td>
                                    <td class="p-5 align-top">
                                        <div class="md:hidden text-[10px] text-slate-400 font-bold uppercase mb-1">金額明細</div>
                                        <div class="text-[11px] text-slate-600 space-y-1 mb-3 bg-slate-50 p-2 rounded-lg">
                                            ${o.serviceItems.map(it => `<div>• ${it.name === '其他' ? it.nameCustom : it.name} <span class="text-slate-400">($${(it.price || 0).toLocaleString()})</span></div>`).join('')}
                                            ${tax > 0 ? `<div class="text-orange-500 font-bold">• 稅額/手續費 ($${tax.toLocaleString()})</div>` : ''}
                                        </div>
                                        <div class="flex items-baseline gap-2">
                                            <span class="font-black text-slate-900 text-2xl">NT$ ${total.toLocaleString()}</span>
                                            <span class="text-[10px] text-slate-400 font-bold uppercase bg-slate-100 px-1.5 py-0.5 rounded">(${o.paymentMethod})</span>
                                        </div>
                                    </td>
                                    <td class="p-5 text-right align-top">
                                        <div class="flex justify-end items-center gap-4 mt-2">
                                            <button onclick='window.setMode("quote", ${JSON.stringify(o).replace(/"/g, '&quot;')})' class="flex-1 md:flex-none bg-slate-900 hover:bg-slate-800 text-white text-sm py-3 px-8 rounded-xl font-black shadow-md transition-all">查看</button>
                                            <button onclick="window.deleteFromCloud('${o.id}')" class="text-red-400 hover:text-red-600 transition-colors p-2 text-xl font-light">✕</button>
                                        </div>
                                    </td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        };

        window.renderPrintPreview = () => {
            const filtered = window.workOrders.filter(o => o.receiveDate.startsWith(window.currentFilterMonth));
            const monthlyRevenue = filtered.reduce((sum, o) => sum + window.calculateOrderTotal(o), 0);
            const container = document.getElementById('mode-printPreview');

            container.innerHTML = `
                <div class="no-print mb-6 flex flex-col md:flex-row justify-between items-center bg-orange-100 p-4 rounded-2xl border border-orange-200 gap-4">
                    <div>
                        <p class="text-orange-800 font-bold">🖨️ 列印預覽模式</p>
                        <p class="text-xs text-orange-600">請確認內容無誤後點擊右側按鈕列印 (建議設定：A4 尺寸、無邊距)</p>
                    </div>
                    <div class="flex gap-3 w-full md:w-auto">
                        <button onclick="window.setMode('history')" class="flex-1 md:flex-none bg-white border border-slate-300 px-6 py-2 rounded-xl font-bold text-sm">返回</button>
                        <button onclick="window.print()" class="flex-1 md:flex-none bg-orange-600 text-white px-8 py-2 rounded-xl font-black text-sm shadow-lg">確認並列印</button>
                    </div>
                </div>

                <div class="print-container bg-white p-5 md:p-10 shadow-2xl border mx-auto mb-10 overflow-x-auto" style="width: 100%; max-width: 210mm; min-height: 297mm;">
                    <div class="flex justify-between items-end border-b-4 border-slate-900 pb-4 mb-6">
                        <div>
                            <h1 class="text-2xl md:text-3xl font-black tracking-tighter">AS TAIPEI 月度營收明細表</h1>
                            <p class="text-slate-500 font-bold text-xs md:text-sm">Premium Paint Protection Center</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black text-slate-400 uppercase">報表月份</p>
                            <p class="text-lg md:text-xl font-black">${window.currentFilterMonth}</p>
                        </div>
                    </div>

                    <table class="print-report-table w-full">
                        <thead>
                            <tr class="bg-slate-100">
                                <th class="border p-2 text-left text-[10px] md:text-xs">單號</th>
                                <th class="border p-2 text-left text-[10px] md:text-xs">接車日期</th>
                                <th class="border p-2 text-left text-[10px] md:text-xs">客戶/電話</th>
                                <th class="border p-2 text-left text-[10px] md:text-xs">車牌/品牌</th>
                                <th class="border p-2 text-right text-[10px] md:text-xs">總金額 (含稅)</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${filtered.map(o => `
                                <tr>
                                    <td class="border p-2 text-[10px] md:text-xs font-bold">${o.id}</td>
                                    <td class="border p-2 text-[10px] md:text-xs">${o.receiveDate}</td>
                                    <td class="border p-2 text-[10px] md:text-xs">${o.customerName}<br><span class="text-slate-400">${o.customerPhone}</span></td>
                                    <td class="border p-2 text-[10px] md:text-xs font-black">${o.licensePlate}<br><span class="text-[10px] font-normal">${o.carBrand === '其他' ? o.carBrandCustom : o.carBrand}</span></td>
                                    <td class="border p-2 text-right text-[10px] md:text-xs font-black">NT$ ${window.calculateOrderTotal(o).toLocaleString()}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                        <tfoot>
                            <tr class="bg-slate-50">
                                <td colspan="4" class="border p-3 text-right font-black text-xs md:text-sm">本月合計總營收</td>
                                <td class="border p-3 text-right font-black text-base md:text-lg text-orange-600">NT$ ${monthlyRevenue.toLocaleString()}</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            `;
        };

        window.renderFormMode = () => {
            const container = document.getElementById('mode-form');
            container.innerHTML = `
                <div class="bg-white p-5 md:p-8 rounded-3xl border shadow-xl space-y-8 no-print">
                    <div class="flex items-center gap-4 border-b pb-6"><h2 class="text-2xl md:text-3xl font-black text-slate-900">服務工單填寫</h2></div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
                        <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 uppercase">客戶姓名</label><input type="text" id="f-customerName" value="${window.currentFormData.customerName}" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold focus:ring-2 ring-orange-500 outline-none"></div>
                        <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 uppercase">聯絡電話</label><input type="tel" id="f-customerPhone" value="${window.currentFormData.customerPhone}" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold focus:ring-2 ring-orange-500 outline-none"></div>
                        <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 uppercase">車牌號碼</label><input type="text" id="f-licensePlate" value="${window.currentFormData.licensePlate}" class="w-full p-4 bg-slate-50 border rounded-2xl font-black uppercase focus:ring-2 ring-orange-500 outline-none"></div>
                        <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 uppercase">結帳方式</label>
                            <select id="f-paymentMethod" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold focus:ring-2 ring-orange-500 outline-none appearance-none">
                                ${["現金", "信用卡", "匯款"].map(p => `<option value="${p}" ${window.currentFormData.paymentMethod===p?'selected':''}>${p}</option>`).join('')}
                            </select>
                        </div>
                        <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 uppercase">汽車品牌</label>
                            <select id="f-carBrand" onchange="window.toggleCustomInput('carBrand', this.value)" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold appearance-none">
                                ${Object.keys(CAR_DATABASE).map(b => `<option value="${b}" ${window.currentFormData.carBrand===b?'selected':''}>${b}</option>`).join('')}
                            </select>
                            <input type="text" id="f-carBrandCustom" value="${window.currentFormData.carBrandCustom||''}" placeholder="手寫輸入品牌" class="w-full p-4 mt-2 bg-orange-50 border-orange-200 border rounded-2xl font-bold ${window.currentFormData.carBrand==='其他'?'':'hidden'}">
                        </div>
                        <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 uppercase">型號</label>
                            <select id="f-carModel" onchange="window.toggleCustomInput('carModel', this.value)" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold appearance-none"></select>
                            <input type="text" id="f-carModelCustom" value="${window.currentFormData.carModelCustom||''}" placeholder="手寫輸入型號" class="w-full p-4 mt-2 bg-orange-50 border-orange-200 border rounded-2xl font-bold ${window.currentFormData.carModel==='其他'?'':'hidden'}">
                        </div>
                        <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 uppercase">接待人員</label>
                            <select id="f-salesPerson" onchange="window.toggleCustomInput('salesPerson', this.value)" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold appearance-none">
                                ${SALES_LIST.map(s => `<option value="${s}" ${window.currentFormData.salesPerson===s?'selected':''}>${s}</option>`).join('')}
                            </select>
                            <input type="text" id="f-salesPersonCustom" value="${window.currentFormData.salesPersonCustom||''}" placeholder="輸入接待名字" class="w-full p-4 mt-2 bg-orange-50 border-orange-200 border rounded-2xl font-bold ${window.currentFormData.salesPerson==='其他'?'':'hidden'}">
                        </div>
                        <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 uppercase">接車日期</label><input type="date" id="f-receiveDate" value="${window.currentFormData.receiveDate}" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold"></div>
                        <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 uppercase">交車日期</label><input type="date" id="f-deliveryDate" value="${window.currentFormData.deliveryDate}" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold"></div>
                        <div class="flex items-center gap-4 p-4 bg-slate-50 border rounded-2xl mt-4 cursor-pointer" onclick="const ck=document.getElementById('f-needsInvoice');ck.checked=!ck.checked">
                            <input type="checkbox" id="f-needsInvoice" ${window.currentFormData.needsInvoice?'checked':''} class="w-6 h-6 rounded border-slate-300 text-orange-500 focus:ring-orange-500" onclick="event.stopPropagation()">
                            <label class="font-black text-slate-700 select-none">需開發票 (+5%)</label>
                        </div>
                    </div>
                    <div class="bg-slate-50 p-5 md:p-6 rounded-3xl border">
                        <h3 class="font-black mb-4 flex justify-between items-center text-lg"><span>服務項目明細</span></h3>
                        <div id="items-container" class="space-y-4"></div>
                        <button type="button" onclick="window.addItem()" class="mt-4 w-full py-4 border-2 border-dashed border-slate-300 rounded-2xl text-slate-400 font-bold hover:bg-white hover:text-orange-500 transition-all">+ 新增服務項目</button>
                    </div>
                    <button id="btn-next" class="w-full bg-slate-950 text-white py-6 rounded-3xl font-black text-xl md:text-2xl shadow-2xl hover:scale-[1.01] active:scale-95 transition-all">預覽報價並進行簽署</button>
                </div>
            `;
            window.fillModels(window.currentFormData.carBrand);
            window.renderItems();

            document.getElementById('btn-next').onclick = () => {
                Object.assign(window.currentFormData, {
                    customerName: document.getElementById('f-customerName').value,
                    customerPhone: document.getElementById('f-customerPhone').value,
                    licensePlate: document.getElementById('f-licensePlate').value.toUpperCase(),
                    paymentMethod: document.getElementById('f-paymentMethod').value,
                    carBrand: document.getElementById('f-carBrand').value,
                    carBrandCustom: document.getElementById('f-carBrandCustom').value,
                    carModel: document.getElementById('f-carModel').value,
                    carModelCustom: document.getElementById('f-carModelCustom').value,
                    salesPerson: document.getElementById('f-salesPerson').value,
                    salesPersonCustom: document.getElementById('f-salesPersonCustom').value,
                    receiveDate: document.getElementById('f-receiveDate').value,
                    deliveryDate: document.getElementById('f-deliveryDate').value,
                    needsInvoice: document.getElementById('f-needsInvoice').checked
                });
                window.setMode('quote');
            };
        };

        window.toggleCustomInput = (field, val) => {
            const input = document.getElementById(`f-${field}Custom`);
            if (val === '其他') input.classList.remove('hidden'); else input.classList.add('hidden');
            if (field === 'carBrand') window.fillModels(val);
        };

        window.fillModels = (brand) => {
            const sel = document.getElementById('f-carModel'); if(!sel) return;
            const models = CAR_DATABASE[brand] || [];
            sel.innerHTML = models.map(m => `<option value="${m}" ${window.currentFormData.carModel===m?'selected':''}>${m}</option>`).join('') + `<option value="其他">其他</option>`;
            window.toggleCustomInput('carModel', sel.value);
        };

        window.renderItems = () => {
            document.getElementById('items-container').innerHTML = window.currentFormData.serviceItems.map((it, i) => `
                <div class="flex flex-col md:flex-row gap-3 bg-white p-4 rounded-2xl border shadow-sm relative">
                    <div class="flex-grow space-y-2">
                        <select onchange="window.toggleItemCustom(${i}, this.value)" class="w-full p-3 bg-slate-50 border rounded-xl font-bold appearance-none">
                            ${SERVICE_TEMPLATES.map(t => `<option value="${t}" ${it.name===t?'selected':''}>${t}</option>`).join('')}
                        </select>
                        <input type="text" id="it-custom-${i}" value="${it.nameCustom||''}" placeholder="手寫輸入服務項目" oninput="window.updItem(${i}, 'nameCustom', this.value)" class="w-full p-3 bg-orange-50 border-orange-100 border rounded-xl font-bold ${it.name==='其他'?'':'hidden'}">
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-xs font-bold text-slate-400">NT$</span>
                        <input type="number" value="${it.price}" placeholder="金額" oninput="window.updItem(${i}, 'price', this.value)" class="flex-grow md:w-32 p-3 bg-slate-50 border rounded-xl font-black text-right text-orange-600">
                        <button onclick="window.removeItem(${i})" class="text-slate-300 hover:text-red-500 p-2 text-xl">✕</button>
                    </div>
                </div>
            `).join('');
        };

        window.toggleItemCustom = (i, val) => { window.currentFormData.serviceItems[i].name = val; window.renderItems(); };
        window.updItem = (i, k, v) => { window.currentFormData.serviceItems[i][k] = (k==='price' ? parseInt(v)||0 : v); };
        window.addItem = () => { window.currentFormData.serviceItems.push({name:'其他', nameCustom:'', price:0}); window.renderItems(); };
        window.removeItem = (i) => { window.currentFormData.serviceItems.splice(i,1); window.renderItems(); };

        window.renderQuoteMode = () => {
            const d = window.currentFormData;
            const container = document.getElementById('mode-quote');
            const subtotal = d.serviceItems.reduce((s, i) => s + (parseInt(i.price)||0), 0);
            
            const hasTax = d.needsInvoice || d.paymentMethod === '信用卡';
            const tax = hasTax ? Math.round(subtotal * 0.05) : 0;
            const total = subtotal + tax;

            const brandDisplay = d.carBrand === '其他' ? d.carBrandCustom : d.carBrand;
            const modelDisplay = d.carModel === '其他' ? d.carModelCustom : d.carModel;
            const salesDisplay = d.salesPerson === '其他' ? d.salesPersonCustom : d.salesPerson;

            container.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                    <div class="lg:col-span-3 bg-white p-6 md:p-12 rounded-3xl shadow-2xl border-t-[12px] border-orange-500 print-container">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b-2 pb-6 mb-8 gap-4">
                            <div>
                                <h1 class="text-3xl md:text-4xl font-black text-slate-950 tracking-tighter">AS TAIPEI</h1>
                                <p class="text-[10px] font-bold text-slate-400 italic mt-1 uppercase tracking-widest">Premium Paint Protection Film Center</p>
                            </div>
                            <div class="text-left md:text-right">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">工單編號</p>
                                <p class="text-xl font-black text-orange-600">${d.id}</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 mb-8 p-5 md:p-6 bg-slate-50 rounded-3xl border text-sm">
                            <div class="col-span-1"><p class="text-[10px] font-black text-slate-400 uppercase">客戶</p><p class="font-black text-base">${d.customerName}</p></div>
                            <div class="col-span-1"><p class="text-[10px] font-black text-slate-400 uppercase">電話</p><p class="font-black text-base">${d.customerPhone}</p></div>
                            <div class="col-span-2"><p class="text-[10px] font-black text-slate-400 uppercase">車輛詳情</p><p class="font-black text-base">${brandDisplay} ${modelDisplay} <span class="bg-orange-500 text-white px-2 py-0.5 rounded text-[10px] ml-1 inline-block">${d.licensePlate}</span></p></div>
                            <div><p class="text-[10px] font-black text-slate-400 uppercase">接待人員</p><p class="font-black text-sm">${salesDisplay}</p></div>
                            <div><p class="text-[10px] font-black text-slate-400 uppercase">接車日期</p><p class="font-bold text-sm">${d.receiveDate}</p></div>
                            <div><p class="text-[10px] font-black text-slate-400 uppercase">交車日期</p><p class="font-bold text-sm text-orange-600">${d.deliveryDate}</p></div>
                            <div><p class="text-[10px] font-black text-slate-400 uppercase">結帳方式</p><p class="font-bold text-sm">${d.paymentMethod} ${hasTax?'(加收5%)':''}</p></div>
                        </div>

                        <div class="overflow-hidden rounded-2xl border mb-8">
                            <table class="w-full">
                                <thead class="bg-slate-900 text-white"><tr><th class="p-4 text-left text-sm">服務項目</th><th class="p-4 text-right text-sm">金額</th></tr></thead>
                                <tbody class="divide-y font-bold">
                                    ${d.serviceItems.map(item => `<tr><td class="p-4 text-sm">${item.name === '其他' ? item.nameCustom : item.name}</td><td class="p-4 text-right font-black text-sm">NT$ ${item.price.toLocaleString()}</td></tr>`).join('')}
                                    ${tax > 0 ? `<tr class="bg-orange-50"><td class="p-4 text-orange-600 text-sm">手續費 / 發票稅額 (5%)</td><td class="p-4 text-right font-black text-orange-600 text-sm">NT$ ${tax.toLocaleString()}</td></tr>` : ''}
                                </tbody>
                                <tfoot class="bg-slate-950 text-white text-lg md:text-xl">
                                    <tr><td class="p-5 text-right font-black">應付總計</td><td class="p-5 text-right font-black text-orange-500">NT$ ${total.toLocaleString()}</td></tr>
                                </tfoot>
                            </table>
                        </div>

                        <div class="space-y-8 text-[12px] leading-relaxed border-t pt-10">
                            <div class="notice-card">
                                <h4 class="font-black text-base text-slate-900 mb-3 flex items-center gap-2">⚠️ 施工品質驗收標準</h4>
                                <div class="text-slate-600 space-y-2">
                                    <p>車漆保護膜與車漆之間無明顯起泡、無毛髮、無髒物粗顆粒。</p>
                                    <p class="font-bold text-slate-800">微小顆粒少量存在為施工中環境空氣落塵之正常現象，無法絕對避免。</p>
                                    <p>在顯眼位置的一手掌範圍內不超過三顆塵粒，且在一米以外距離無法看清漆面塵粒，即符合專業驗收標準。</p>
                                </div>
                            </div>
                            
                            <div class="notice-card" style="border-left-color: #3b82f6;">
                                <h4 class="font-black text-base text-slate-900 mb-3 flex items-center gap-2">🛡️ 保護膜養護須知</h4>
                                <div class="text-slate-600 space-y-3">
                                    <p><span class="font-black text-slate-900">1. 48小時嚴禁洗車：</span>施工完畢兩天內請勿洗車，如需清潔請以軟布濕擦。</p>
                                    <p><span class="font-black text-slate-900">2. 洗車務必擦乾：</span>洗車後請確實將水分擦乾，防止水垢產生。嚴禁高壓水槍近距離直噴膜面邊緣。</p>
                                    <p><span class="font-black text-slate-900">3. 初期霧感現象：</span>安裝後若有微霧感屬水分蒸發正常過程，視天候約 10 天後恢復高亮。</p>
                                    <p><span class="font-black text-slate-900">4. 專業保養建議：</span>建議每 1-2 個月回廠養護，可延長膜料壽命與撥水效果。</p>
                                </div>
                            </div>

                            <div class="notice-card" style="border-left-color: #ef4444;">
                                <h4 class="font-black text-base text-slate-900 mb-3 flex items-center gap-2">🚫 不在保固服務範圍之事項</h4>
                                <div class="text-slate-600 space-y-2">
                                    <p><span class="font-black text-slate-900">1. 未按時回廠維護：</span>未依規定定期回 AS TAIPEI 進行專業養護者。</p>
                                    <p><span class="font-black text-slate-900">2. 不當洗車與外力：</span>強力水槍直沖邊緣、使用電腦洗車機或粗糙海綿。</p>
                                    <p><span class="font-black text-slate-900">3. 環境污染物浸蝕：</span>未及時去除鳥糞、樹汁、蟲屍導致之膜面腐蝕。</p>
                                    <p><span class="font-black text-slate-900">4. 水漬印記：</span>水源中礦物質沉澱形成之水垢印記。</p>
                                    <p><span class="font-black text-slate-900">5. 物理性損傷：</span>碎石擊穿、人為刮傷、事故導致之破損。</p>
                                    <p><span class="font-black text-slate-900">6. 未經授權之加工：</span>非本公司授權之第三方加工或撕除膜料者。</p>
                                </div>
                            </div>
                        </div>

                        <div class="mt-12 pt-10 border-t-2 border-slate-900 border-opacity-10 grid grid-cols-1 md:grid-cols-2 gap-10">
                             <div>
                                 <p class="text-[10px] font-black uppercase mb-4 text-slate-400 tracking-widest">AS TAIPEI 簽章</p>
                                 <div class="h-24 md:h-32 flex items-end pb-4 border-b-2 border-slate-900 w-full">
                                     <span class="text-4xl md:text-5xl font-black italic text-slate-900 tracking-tighter">${salesDisplay}</span>
                                 </div>
                             </div>

                             <div>
                                 <div class="flex items-center gap-2 mb-4">
                                     <span class="text-blue-500">🖋️</span>
                                     <p class="text-[10px] font-black uppercase text-slate-900 tracking-widest">客戶簽署</p>
                                 </div>
                                 <div class="h-40 md:h-48 bg-white rounded-3xl border-2 border-slate-200 mb-4 overflow-hidden relative group">
                                    ${d.isSigned ? `<img src="${d.signatureImage}" class="h-full mx-auto">` : `<canvas id="sig-canvas" class="signature-canvas w-full h-full"></canvas>`}
                                 </div>
                                 <div class="flex gap-2 no-print">
                                    ${!d.isSigned ? `<button onclick="window.saveSig()" class="flex-grow bg-orange-600 hover:bg-orange-700 text-white py-4 rounded-2xl font-black text-lg shadow-lg active:scale-95 transition-all">確認簽署</button>` : ''}
                                    <button onclick="window.clearSig()" class="bg-slate-200 hover:bg-slate-300 text-slate-600 px-6 md:px-8 py-4 rounded-2xl font-black shadow-sm transition-all text-xs md:text-sm">重設</button>
                                 </div>
                             </div>
                        </div>
                    </div>

                    <div class="no-print space-y-4">
                        <button onclick="window.saveToCloud(window.currentFormData)" class="w-full bg-orange-500 text-white py-6 rounded-3xl font-black text-xl shadow-2xl hover:scale-[1.02] active:scale-95 transition-all">✅ 儲存工單</button>
                        <button onclick="window.print()" class="w-full bg-slate-950 text-white py-6 rounded-3xl font-black text-xl shadow-xl active:scale-95 transition-all">🖨️ 列印單據</button>
                        <button onclick="window.setMode('form')" class="w-full bg-white text-slate-500 py-4 rounded-2xl font-bold border hover:bg-slate-50 active:scale-95 transition-all">返回修改</button>
                    </div>
                </div>
            `;
            if(!d.isSigned) setTimeout(initSig, 100);
        };

        let sigC, sigX, drawing = false;
        const initSig = () => {
            sigC = document.getElementById('sig-canvas'); if(!sigC) return;
            sigX = sigC.getContext('2d');
            sigC.width = sigC.offsetWidth; sigC.height = sigC.offsetHeight;
            sigX.strokeStyle = "#1e293b"; sigX.lineWidth = 4; sigX.lineCap = "round";
            const getP = (e) => { const r = sigC.getBoundingClientRect(); const ev = e.touches ? e.touches[0] : e; return { x: ev.clientX - r.left, y: ev.clientY - r.top }; };
            const s = (e) => { drawing=true; const p=getP(e); sigX.beginPath(); sigX.moveTo(p.x, p.y); };
            const m = (e) => { if(!drawing) return; const p=getP(e); sigX.lineTo(p.x, p.y); sigX.stroke(); };
            sigC.addEventListener('mousedown', s); sigC.addEventListener('mousemove', m); window.addEventListener('mouseup', ()=>drawing=false);
            sigC.addEventListener('touchstart', (e)=>{e.preventDefault(); s(e);}, {passive:false}); sigC.addEventListener('touchmove', (e)=>{e.preventDefault(); m(e);}, {passive:false});
        };
        
        window.saveSig = () => { const c = document.getElementById('sig-canvas'); window.currentFormData.signatureImage = c.toDataURL(); window.currentFormData.isSigned = true; window.renderQuoteMode(); };
        window.clearSig = () => { window.currentFormData.isSigned = false; window.currentFormData.signatureImage = null; window.renderQuoteMode(); };

        window.saveToCloud = async (orderData) => {
            if (!auth.currentUser) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'workOrders', orderData.id);
            try {
                await setDoc(docRef, { ...orderData, updatedAt: serverTimestamp() }, { merge: true });
                window.setMode('history');
                window.showMessage("工單儲存成功");
            } catch (e) { 
                console.error(e); 
                window.showMessage("儲存失敗，請檢查權限"); 
            }
        };

        window.exportExcel = () => {
            const data = window.workOrders.filter(o => o.receiveDate.startsWith(window.currentFilterMonth)).map(o => ({
                "單號": o.id, "日期": o.receiveDate, "客戶": o.customerName, "電話": o.customerPhone, "車牌": o.licensePlate, 
                "品牌": o.carBrand==='其他'?o.carBrandCustom:o.carBrand, "型號": o.carModel==='其他'?o.carModelCustom:o.carModel,
                "接待": o.salesPerson==='其他'?o.salesPersonCustom:o.salesPerson, "付款方式": o.paymentMethod,
                "總額(含稅)": window.calculateOrderTotal(o)
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "月報表");
            XLSX.writeFile(wb, `AS_TAIPEI_${window.currentFilterMonth}.xlsx`);
        };

        startAuth();
    </script>

    <header class="no-print bg-slate-950 py-10 px-4 text-center shadow-2xl">
        <h1 class="text-4xl md:text-5xl font-black text-orange-500 tracking-tighter">AS TAIPEI</h1>
        <div id="online-status" class="text-[10px] text-slate-500 mt-2 font-bold uppercase tracking-widest italic">初始化雲端環境...</div>
    </header>

    <main id="app-container" class="max-w-6xl mx-auto px-4 py-6 md:py-10 print-container">
        <nav id="nav-bar" class="no-print flex flex-row justify-center gap-3 md:gap-6 mb-8 md:mb-12">
            <button onclick="setMode('history')" class="flex-1 md:flex-none bg-white text-slate-700 p-4 md:p-5 px-6 md:px-12 rounded-2xl md:rounded-3xl font-black shadow-sm border border-slate-200 hover:bg-slate-50 text-sm md:text-base">📋 工單總表</button>
            <button onclick="setMode('form', null, true)" class="flex-1 md:flex-none bg-orange-500 text-white p-4 md:p-5 px-6 md:px-12 rounded-2xl md:rounded-3xl font-black shadow-xl hover:bg-orange-600 text-sm md:text-base">＋ 建立新案</button>
        </nav>

        <section id="mode-history" class="hidden"></section>
        <section id="mode-form" class="hidden"></section>
        <section id="mode-quote" class="hidden"></section>
        <section id="mode-printPreview" class="hidden"></section>
    </main>

    <!-- 刪除確認視窗：手機端優化 -->
    <div id="custom-confirm-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center hidden p-4 no-print">
        <div class="bg-white p-6 md:p-8 rounded-[2rem] md:rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center border-t-8 border-red-500 animate-in fade-in zoom-in duration-200">
            <div class="text-4xl md:text-5xl mb-4">🗑️</div>
            <h3 class="text-xl md:text-2xl font-black text-slate-900 mb-2 tracking-tighter">確認要刪除嗎？</h3>
            <p class="text-sm md:text-base text-slate-500 font-medium mb-8 leading-relaxed">刪除後單據資料將無法復原，<br>請確認是否繼續操作。</p>
            <div class="flex gap-3">
                <button onclick="document.getElementById('custom-confirm-modal').classList.add('hidden')" class="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-black transition-all hover:bg-slate-200">取消</button>
                <button onclick="window.executeDelete()" class="flex-1 py-4 bg-red-500 text-white rounded-2xl font-black shadow-lg shadow-red-200 transition-all hover:bg-red-600 active:scale-95">確定刪除</button>
            </div>
        </div>
    </div>

    <!-- UI 訊息條：手機端優化 -->
    <div id="ui-message" class="fixed top-5 md:top-10 left-1/2 -translate-x-1/2 z-[200] hidden no-print w-[90%] md:w-auto">
        <div class="bg-slate-900 text-white px-6 md:px-10 py-4 rounded-2xl md:rounded-3xl shadow-2xl font-black text-xs md:text-sm tracking-wide animate-bounce flex items-center justify-center gap-3 border border-slate-700">
            <span class="text-orange-500 text-xl">●</span>
            <span id="ui-message-text"></span>
        </div>
    </div>
</body>
</html>
