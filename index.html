<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AS TAIPEI 雲端美研系統 v11.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary-orange: #f97316; --deep-slate: #0f172a; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #0f172a; -webkit-tap-highlight-color: transparent; }
        .signature-canvas { border: 2px solid #e2e8f0; background-color: #fff; touch-action: none; cursor: crosshair; border-radius: 16px; }
        
        @media (max-width: 768px) {
            .responsive-table thead { display: none; }
            .responsive-table tr { display: block; border-bottom: 8px solid #f1f5f9; padding: 15px 0; }
            .responsive-table td { display: block; width: 100%; text-align: left !important; padding: 10px 20px !important; border: none !important; }
            .responsive-table td:last-child { border-top: 1px solid #f1f5f9; margin-top: 10px; }
        }

        .print-only { display: none; }
        
        @media print {
            @page { 
                size: A4 portrait; 
                margin: 10mm 8mm 10mm 8mm; /* 物理安全邊界，防止被任何印表機邊緣裁切 */
            }
            body { 
                background-color: white !important; 
                margin: 0; 
                padding: 0; 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
            }
            .no-print { display: none !important; }
            .print-only { display: block; }
            
            .print-header { flex-direction: row !important; align-items: center !important; margin-bottom: 1.5rem !important; pb-6 !important; }
            .print-footer { flex-direction: row !important; align-items: flex-end !important; margin-top: 2rem !important; }
            .grid-cols-3 { display: grid !important; grid-template-columns: repeat(3, minmax(0, 1fr)) !important; }
            
            /* A4 滿版寬度精準定位 */
            .print-container { 
                width: 100% !important; 
                max-width: 194mm !important; 
                padding: 0 !important; 
                margin: 0 auto !important; 
                border: none !important; 
                box-shadow: none !important;
                background-color: white !important;
                page-break-inside: avoid;
            }

            /* 強制防止重要內容在不該斷開的地方被裁切成兩頁 */
            .print-no-break {
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }

            /* A4 間距微調，最大化容納量，避免擠壓出多餘空白頁 */
            .print-info-grid {
                padding: 1.5rem !important;
                margin-bottom: 1.5rem !important;
                gap: 1rem !important;
                border-radius: 1.5rem !important;
            }
            .print-notes {
                margin-bottom: 1.5rem !important;
                padding: 1rem !important;
                border-radius: 1rem !important;
            }
            .print-table-container {
                margin-bottom: 1.5rem !important;
                border-radius: 1rem !important;
            }
            .print-clause {
                margin-bottom: 1.5rem !important;
                gap: 1.5rem !important;
            }

            .print-report-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
            .print-report-table th, .print-report-table td { border: 1px solid #e2e8f0; padding: 10px 8px; text-align: left; font-size: 11px; line-height: 1.4; }
            .print-report-table th { background-color: #f8fafc !important; color: #0f172a !important; -webkit-print-color-adjust: exact; }
            .page-break { page-break-after: always; }
            .bg-orange-500 { background-color: #f97316 !important; -webkit-print-color-adjust: exact; }
            .card-bg-print {
                background-color: #f0fdf4 !important;
                border: 2px solid #a7f3d0 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }

        .quote-watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 8rem;
            font-weight: 900;
            color: rgba(249, 115, 22, 0.03);
            pointer-events: none;
            z-index: 0;
            white-space: nowrap;
        }
    </style>
</head>
<body class="min-h-screen">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const CAR_DATABASE = {
            "Porsche 保時捷": ["911", "Taycan", "Cayenne", "Macan", "718 Panamera"],
            "BMW": ["M2/M3/M4", "M5/M8", "X5/X6/X7", "3/5/7 Series", "iX/i4/i7"],
            "Mercedes-Benz": ["G-Class", "AMG GT", "S-Class", "E-Class", "C-Class", "GLE/GLC"],
            "Tesla 特斯拉": ["Model S", "Model X", "Model 3", "Model Y"],
            "Audi 奧迪": ["RS6/RS7", "e-tron GT", "R8", "Q7/Q8", "A4/A5/A6"],
            "Lexus 凌志": ["RX Series", "NX Series", "LM Series", "ES Series", "LC/LS"],
            "Toyota": ["Alphard/Vellfire", "Crown", "RAV4", "GR Yaris/Supra", "Sienna"],
            "Ferrari 法拉利": ["296 GTB", "SF90", "Purosangue", "F8/Roma", "812"],
            "Lamborghini 藍寶親尼": ["Urus", "Revuelto", "Huracán", "Aventador"],
            "McLaren 麥拉倫": ["750S/720S", "Artura", "GT", "765LT"],
            "Aston Martin": ["DBX", "Vantage", "DB12/DB11"],
            "Bentley 賓利": ["Continental GT", "Bentayga", "Flying Spur"],
            "Rolls-Royce 勞斯萊斯": ["Cullinan", "Ghost", "Phantom", "Spectre"],
            "Maserati 瑪莎拉蒂": ["Grecale", "Levante", "MC20", "Ghibli"],
            "Land Rover": ["Range Rover", "Defender", "Discovery"],
            "Volvo": ["XC90", "XC60", "XC40", "V60/V90"],
            "Mazda": ["CX-60", "CX-5", "CX-30", "Mazda 3"],
            "Honda": ["Civic Type R", "CR-V", "HR-V", "Odyssey"],
            "其他": []
        };

        const SALES_LIST = ["Audi", "小蔡", "小楊", "其他"];

        const SERVICE_TEMPLATES = [
            "全車頂級車漆保護膜 (PPF)", "全車改色膜施工", "車頭局部防護方案", "迎風面保護膜",
            "內裝專屬保護膜", "雙層陶瓷深層鍍膜", "前置鍍膜方案一", "前置+後置鍍膜方案二", "全車基礎美容增艷", "精緻手作洗車保養",
            "玻璃奈米撥水塗層", "輪框專屬保護層", "皮椅深層清潔養護", "其他"
        ];

        const firebaseConfig = {
            apiKey: "AIzaSyBEgWLZ4_1cCVswkKll6N4yW1O_xoTEGyg",
            authDomain: "as-taipei-1a211.firebaseapp.com",
            projectId: "as-taipei-1a211",
            storageBucket: "as-taipei-1a211.firebasestorage.app",
            messagingSenderId: "193808418904",
            appId: "1:193808418904:web:b58e1317b5447b4f44e22d"
        };

        let app, db, auth;
        try {
            app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);
        } catch (e) { console.error("Firebase Init Error:", e); }

        const appId = 'as-taipei-1a211';
        window.workOrders = [];
        window.currentMode = 'history';
        window.currentFormData = {};

        // 使用本地時間初始化查詢月份，避免 UTC 時區偏差造成月份落後
        const initNow = new Date();
        window.currentFilterMonth = `${initNow.getFullYear()}-${(initNow.getMonth() + 1).toString().padStart(2, '0')}`;

        const startAuth = async () => {
            const statusEl = document.getElementById('online-status');
            try {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        if (statusEl) statusEl.innerText = "● 雲端同步中";
                        const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'workOrders'), orderBy("updatedAt", "desc"));
                        onSnapshot(q, (snapshot) => {
                            window.workOrders = snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id }));
                            if (window.currentMode === 'history') window.renderHistoryMode();
                            if (statusEl) statusEl.innerText = "● 雲端連線正常";
                        }, (error) => { if (statusEl) statusEl.innerText = "● 連線權限異常"; });
                    }
                });
            } catch (err) { if (statusEl) statusEl.innerText = "● 離線模式"; }
        };

        window.calculateOrderTotal = (o) => {
            if (!o || !o.serviceItems) return 0;
            const subtotal = o.serviceItems.reduce((sum, item) => sum + (parseInt(item.price) || 0), 0);
            const hasTax = o.needsInvoice || o.paymentMethod === '信用卡';
            const tax = hasTax ? Math.round(subtotal * 0.05) : 0;
            return subtotal + tax;
        };

        window.showMessage = (text) => {
            const el = document.getElementById('ui-message');
            const txt = document.getElementById('ui-message-text');
            if (!el || !txt) return;
            txt.innerText = text; el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        };

        window.handlePrint = () => { 
            window.print(); 
        };

        window.setMode = (mode, data = null, isNew = false) => {
            window.currentMode = mode;
            if (isNew) {
                // 100% 本地時區安全：依據當前裝置時區生成，絕不使用 ISOString 避免時差落後一天的 Bug
                const now = new Date();
                const localYear = now.getFullYear();
                const localMonth = (now.getMonth() + 1).toString().padStart(2, '0');
                const localDay = now.getDate().toString().padStart(2, '0');

                const todayStr = `${localYear}-${localMonth}-${localDay}`; // 當天日期 YYYY-MM-DD
                const currentMonthPrefix = `${localYear.toString().slice(2)}${localMonth}`; // YYMM 例如 "2607"
                const fullDateStr = `${localYear.toString().slice(2)}${localMonth}${localDay}`; // YYMMDD 例如 "260715"

                // 2. 嚴格對齊：只篩選 receiveDate 符合當前本地年月份 "YYYY-MM" 的雲端有效案源
                const targetMonthStr = `${localYear}-${localMonth}`;
                const monthlyOrders = window.workOrders.filter(o => o.receiveDate && o.receiveDate.startsWith(targetMonthStr));
                
                // 計算正確的流水號 (列表上顯示幾張，新單就是 +1)
                const seq = (monthlyOrders.length + 1).toString().padStart(3, '0');

                window.currentFormData = {
                    id: `AS-${fullDateStr}-${seq}`,
                    receiveDate: todayStr, deliveryDate: todayStr,
                    customerName: '', customerPhone: '', licensePlate: '',
                    carBrand: 'Audi 奧迪', carBrandCustom: '', carModel: 'RS6/RS7', carModelCustom: '',
                    salesPerson: 'Audi', salesPersonCustom: '', paymentMethod: '現金', needsInvoice: false,
                    serviceItems: [{ name: '全車頂級車漆保護膜 (PPF)', nameCustom: '', price: 0 }],
                    notes: '', salesNotes: '', isSigned: false, signatureImage: null
                };
            } else if (data) { window.currentFormData = JSON.parse(JSON.stringify(data)); }
            ['history', 'form', 'quote', 'printPreview'].forEach(m => {
                const el = document.getElementById(`mode-${m}`);
                if (el) el.classList.add('hidden');
            });
            if (mode === 'history') window.renderHistoryMode();
            else if (mode === 'form') window.renderFormMode();
            else if (mode === 'quote') window.renderQuoteMode();
            else if (mode === 'printPreview') window.renderPrintPreview();
            const target = document.getElementById(`mode-${mode}`);
            if (target) target.classList.remove('hidden');
            window.scrollTo(0,0);
        };

        window.renderPrintPreview = () => {
            const filtered = window.workOrders.filter(o => o.receiveDate && o.receiveDate.startsWith(window.currentFilterMonth));
            const monthlyRevenue = filtered.reduce((sum, o) => sum + window.calculateOrderTotal(o), 0);
            const container = document.getElementById('mode-printPreview');
            container.innerHTML = `
                <div class="no-print mb-6 flex flex-col md:flex-row justify-between items-center bg-orange-50 p-6 rounded-3xl border border-orange-200 gap-4">
                    <div class="flex items-center gap-3"><div class="bg-orange-500 text-white p-2 rounded-xl">📊</div><div><p class="text-orange-950 font-black text-lg">月度營收報表預覽</p><p class="text-xs text-orange-700 font-bold">當月共有 ${filtered.length} 筆案件記錄</p></div></div>
                    <div class="flex gap-3 w-full md:w-auto"><button onclick="window.setMode('history')" class="flex-1 md:flex-none bg-white border-2 border-slate-200 px-6 py-3 rounded-2xl font-bold text-slate-600 hover:bg-slate-50">返回</button><button onclick="window.handlePrint()" class="flex-1 md:flex-none bg-orange-600 text-white px-8 py-3 rounded-2xl font-black shadow-lg shadow-orange-200 hover:bg-orange-700">立即列印</button></div>
                </div>
                <div class="print-container bg-white p-8 md:p-12 shadow-2xl border mx-auto mb-10">
                    <div class="flex justify-between items-start border-b-4 border-slate-900 pb-6 mb-8 print-header">
                        <div><h1 class="text-3xl font-black tracking-tighter text-slate-950 mb-1">AS TAIPEI 月度營收明細表</h1><p class="text-slate-500 font-bold text-xs uppercase tracking-widest">Premium Paint Protection Management System</p></div>
                        <div class="text-right"><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">報表月份</p><p class="text-2xl font-black text-slate-900 leading-none">${window.currentFilterMonth}</p><p class="text-[9px] text-slate-400 mt-2 font-medium">製表日期：${new Date().toLocaleDateString()}</p></div>
                    </div>
                    <table class="print-report-table">
                        <thead><tr><th style="width: 12%">單號</th><th style="width: 12%">日期</th><th style="width: 18%">客戶資訊</th><th style="width: 18%">車輛資訊</th><th style="width: 28%">施工項目明細</th><th style="width: 12%; text-align: right;">總計(含稅)</th></tr></thead>
                        <tbody>${filtered.map(o => {
                            const itemsText = o.serviceItems.map(it => `• ${it.name === '其他' ? it.nameCustom : it.name}`).join('<br>');
                            return `<tr><td class="font-bold text-[9px] md:text-xs">${o.id}</td><td>${o.receiveDate}</td><td class="font-bold">${o.customerName}<br><span class="text-[9px] font-normal text-slate-500">${o.customerPhone}</span></td><td class="font-black">${o.licensePlate}<br><span class="text-[9px] font-normal text-slate-500">${o.carBrand}</span></td><td class="text-[10px]">${itemsText}</td><td class="text-right font-black">NT$ ${window.calculateOrderTotal(o).toLocaleString()}</td></tr>`
                        }).join('')}</tbody>
                        <tfoot><tr style="background-color: #f8fafc;"><td colspan="5" style="text-align: right; font-weight: 900; font-size: 13px; padding: 15px;">本月合計營收額</td><td style="text-align: right; font-weight: 900; font-size: 16px; color: #ea580c; padding: 15px;">NT$ ${monthlyRevenue.toLocaleString()}</td></tr></tfoot>
                    </table>
                </div>
            `;
        };

        window.renderQuoteMode = () => {
            const d = window.currentFormData;
            const container = document.getElementById('mode-quote');
            const subtotal = d.serviceItems.reduce((s, i) => s + (parseInt(i.price)||0), 0);
            const hasTax = d.needsInvoice || d.paymentMethod === '信用卡';
            const tax = hasTax ? Math.round(subtotal * 0.05) : 0;
            const total = subtotal + tax;

            const brandDisplay = d.carBrand === '其他' ? d.carBrandCustom : d.carBrand;
            const modelDisplay = d.carModel === 'Tailwind' ? d.carModelCustom : d.carModel;
            const salesDisplay = d.salesPerson === '其他' ? d.salesPersonCustom : d.salesPerson;

            container.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                    <div class="lg:col-span-3 bg-white p-6 md:p-12 rounded-[3rem] shadow-2xl border-t-[16px] border-orange-500 print-container relative overflow-hidden">
                        <div class="quote-watermark">AS TAIPEI</div>
                        
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b-2 border-slate-100 pb-8 mb-10 gap-6 relative z-10 print-header">
                            <div>
                                <h1 class="text-4xl md:text-5xl font-black text-slate-950 tracking-tighter">AS TAIPEI</h1>
                                <p class="text-[11px] font-black text-orange-600 mt-2 uppercase tracking-[0.2em]">Premium Paint Protection Film Specialist</p>
                                <p class="text-[10px] text-slate-400 mt-1 font-bold">台北市內湖區民權東路六段15巷35號1樓 | 02-2790-9077</p>
                            </div>
                            <div class="bg-slate-50 p-6 rounded-3xl border-2 border-slate-100 text-right">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">施工服務工單 / 報價單</p>
                                <p class="text-2xl font-black text-slate-900 font-mono tracking-tighter">${d.id}</p>
                                <p class="text-[10px] text-slate-400 mt-2">建立日期：${new Date().toLocaleDateString()}</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-y-10 gap-x-6 mb-10 p-10 bg-slate-50/50 rounded-[2.5rem] border border-slate-100 relative z-10 print-info-grid">
                            <div class="space-y-1">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">客戶姓名</p>
                                <p class="font-black text-lg text-slate-900">${d.customerName || '-'}</p>
                            </div>
                            <div class="space-y-1">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">聯絡電話</p>
                                <p class="font-black text-lg text-slate-900">${d.customerPhone || '-'}</p>
                            </div>
                            <div class="space-y-1">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">施工車輛</p>
                                <div class="flex items-center gap-3">
                                    <p class="font-black text-lg text-slate-900">${brandDisplay} ${d.carModel==='其他'?d.carModelCustom:d.carModel}</p>
                                    <span class="bg-slate-900 text-white px-2 py-1 rounded-lg text-[11px] font-mono font-black uppercase tracking-wider">${d.licensePlate || 'N/A'}</span>
                                </div>
                            </div>
                            
                            <div class="space-y-1">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">接待人員</p>
                                <p class="font-black text-lg text-slate-800">${salesDisplay}</p>
                            </div>
                            <div class="space-y-1">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">接車 / 交車日期</p>
                                <p class="font-black text-base text-slate-800 whitespace-nowrap">${d.receiveDate} <span class="text-slate-300 mx-1 text-sm">→</span> <span class="text-orange-600">${d.deliveryDate}</span></p>
                            </div>
                            <div class="space-y-1">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">付款方式</p>
                                <p class="font-black text-lg text-slate-800">${d.paymentMethod} <span class="text-[10px] font-bold text-slate-400">${hasTax?'(含稅 5%)':''}</span></p>
                            </div>
                        </div>

                        <!-- 備註區塊：區分一般備註與業務內部備註 -->
                        <div class="space-y-4 mb-10">
                            ${d.notes && d.notes.trim() !== '' ? `
                            <div class="p-6 bg-orange-50/50 rounded-2xl border border-orange-200 border-dashed relative z-10 print-notes">
                                <p class="text-[10px] font-black text-orange-500 uppercase tracking-widest mb-2 flex items-center gap-2">📝 備註事項</p>
                                <p class="font-medium text-slate-700 whitespace-pre-wrap text-sm">${d.notes}</p>
                            </div>
                            ` : ''}
                        </div>

                        <div class="overflow-hidden rounded-[2rem] border-2 border-slate-100 mb-10 shadow-sm relative z-10 print-table-container">
                            <table class="w-full">
                                <thead class="bg-slate-900 text-white">
                                    <tr><th class="p-5 text-left text-xs font-black uppercase tracking-widest">施工服務項目明細</th><th class="p-5 text-right text-xs font-black uppercase tracking-widest">金額 (TWD)</th></tr>
                                </thead>
                                <tbody class="divide-y-2 divide-slate-50 font-bold text-slate-700">
                                    ${d.serviceItems.map(item => `<tr><td class="p-5 text-sm">${item.name === '其他' ? item.nameCustom : item.name}</td><td class="p-5 text-right font-black font-mono text-base">NT$ ${item.price.toLocaleString()}</td></tr>`).join('')}
                                    ${tax > 0 ? `<tr class="bg-slate-50"><td class="p-5 text-slate-500 text-xs italic font-medium">稅額 / 手續費 (5%)</td><td class="p-5 text-right font-black text-slate-500 text-sm">NT$ ${tax.toLocaleString()}</td></tr>` : ''}
                                </tbody>
                                <tfoot class="bg-white border-t-4 border-slate-900">
                                    <tr><td class="p-6 text-right font-black text-base uppercase tracking-widest text-slate-900">應付金額總計 (Total Amount)</td><td class="p-6 text-right font-black text-4xl tracking-tighter text-slate-950">NT$ ${total.toLocaleString()}</td></tr>
                                </tfoot>
                            </table>
                        </div>

                        <div class="flex flex-col gap-10 text-[14px] leading-relaxed border-t-2 border-slate-100 pt-10 text-slate-600 font-medium relative z-10 print-clause">
                            
                            <div class="pl-6 border-l-8 border-orange-500 print-no-break">

        let sigC, sigX, drawing = false;
        const initSig = () => {
            sigC = document.getElementById('sig-canvas'); if(!sigC) return;
            sigX = sigC.getContext('2d');
            sigC.width = sigC.offsetWidth; sigC.height = sigC.offsetHeight;
            sigX.strokeStyle = "#0f172a"; sigX.lineWidth = 4; sigX.lineCap = "round";
            const getP = (e) => { const r = sigC.getBoundingClientRect(); const ev = e.touches ? e.touches[0] : e; return { x: (ev.clientX - r.left) * (sigC.width / r.width), y: (ev.clientY - r.top) * (sigC.height / r.height) }; };
            const s = (e) => { drawing=true; const p=getP(e); sigX.beginPath(); sigX.moveTo(p.x, p.y); };
            const m = (e) => { if(!drawing) return; const p=getP(e); sigX.lineTo(p.x, p.y); sigX.stroke(); };
            sigC.addEventListener('mousedown', s); sigC.addEventListener('mousemove', m); window.addEventListener('mouseup', ()=>drawing=false);
            sigC.addEventListener('touchstart', (e)=>{e.preventDefault(); s(e);}, {passive:false}); sigC.addEventListener('touchmove', (e)=>{e.preventDefault(); m(e);}, {passive:false});
        };
        window.saveSig = () => { const c = document.getElementById('sig-canvas'); if(!c) return; window.currentFormData.signatureImage = c.toDataURL(); window.currentFormData.isSigned = true; window.renderQuoteMode(); };
        window.clearSig = () => { window.currentFormData.isSigned = false; window.currentFormData.signatureImage = null; window.renderQuoteMode(); };

        window.saveToCloud = async (orderData) => {
            if (!auth || !auth.currentUser) { window.showMessage("尚未連線"); return; }
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'workOrders', orderData.id);
            try { await setDoc(docRef, { ...JSON.parse(JSON.stringify(orderData)), updatedAt: serverTimestamp() }, { merge: true }); window.showMessage("儲存成功"); window.setMode('history'); } catch (e) { window.showMessage("儲存失敗"); }
        };
        window.deleteFromCloud = (id) => { window.pendingDeleteId = id; document.getElementById('custom-confirm-modal').classList.remove('hidden'); };
        window.executeDelete = async () => { const id = window.pendingDeleteId; document.getElementById('custom-confirm-modal').classList.add('hidden'); if (!id || !auth.currentUser) return; try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'workOrders', id)); window.showMessage("工單已刪除"); } catch (e) { window.showMessage("刪除失敗"); } };
        window.exportExcel = () => { const data = window.workOrders.filter(o => o.receiveDate && o.receiveDate.startsWith(window.currentFilterMonth)).map(o => ({ "單號": o.id, "日期": o.receiveDate, "客戶": o.customerName, "車牌": o.licensePlate, "品牌": o.carBrand, "接待": o.salesPerson, "總額(含稅)": window.calculateOrderTotal(o) })); const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "月報表"); XLSX.writeFile(wb, `AS_TAIPEI_${window.currentFilterMonth}.xlsx`); };

        startAuth(); window.addEventListener('load', () => window.setMode('history'));
    </script>

    <!-- 頂部與主介面框架 -->
    <header class="no-print bg-slate-950 py-12 px-4 text-center shadow-2xl"><h1 class="text-5xl md:text-6xl font-black text-orange-500 tracking-tighter">AS TAIPEI</h1><div id="online-status" class="text-[10px] text-slate-500 mt-3 font-bold uppercase tracking-[0.3em] italic">初始化雲端環境...</div></header>

    <main id="app-container" class="max-w-6xl mx-auto px-4 py-8 md:py-14 print-container">
        <nav id="nav-bar" class="no-print flex flex-row justify-center gap-4 md:gap-8 mb-10 md:mb-16">
            <button onclick="window.setMode('history')" class="flex-1 md:flex-none bg-white text-slate-700 p-5 md:p-6 px-8 md:px-16 rounded-[2.5rem] font-black shadow-lg border border-slate-100 hover:bg-slate-50 text-sm md:text-lg transition-all active:scale-95 flex items-center justify-center gap-2">📋 工單總表</button>
            <button onclick="window.setMode('form', null, true)" class="flex-1 md:flex-none bg-orange-500 text-white p-5 md:p-6 px-8 md:px-16 rounded-[2.5rem] font-black shadow-2xl shadow-orange-200 hover:bg-orange-600 text-sm md:text-lg transition-all active:scale-95 flex items-center justify-center gap-2">＋ 建立新案</button>
        </nav>
        <section id="mode-history" class="hidden"></section>
        <section id="mode-form" class="hidden"></section>
        <section id="mode-quote" class="hidden"></section>
        <section id="mode-printPreview" class="hidden"></section>
    </main>

    <!-- 自訂刪除確認對話框 -->
    <div id="custom-confirm-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center hidden p-4 no-print"><div class="bg-white p-10 rounded-[3rem] shadow-2xl max-w-sm w-full text-center border-t-8 border-red-500"><div class="text-5xl mb-6">🗑️</div><h3 class="text-2xl font-black text-slate-900 mb-2">確認要刪除嗎？</h3><p class="text-sm text-slate-500 mb-8">刪除後資料將無法從雲端復原。</p><div class="flex gap-4"><button onclick="document.getElementById('custom-confirm-modal').classList.add('hidden')" class="flex-1 py-4 bg-slate-50 text-slate-500 rounded-2xl font-black">取消</button><button onclick="window.executeDelete()" class="flex-1 py-4 bg-red-500 text-white rounded-2xl font-black shadow-lg shadow-red-200">確定刪除</button></div></div></div>

    <!-- UI 訊息提示框 -->
    <div id="ui-message" class="fixed top-10 left-1/2 -translate-x-1/2 z-[200] hidden no-print w-[90%] md:w-auto"><div class="bg-slate-950 text-white px-10 py-5 rounded-[2.5rem] shadow-2xl font-black text-sm tracking-widest flex items-center justify-center gap-4 border border-slate-800"><span class="text-orange-500 text-xl">●</span><span id="ui-message-text"></span></div></div>
</body>
</html>
